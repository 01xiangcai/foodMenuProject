server:
  port: 8080

spring:
  application:
    name: food_menu
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/food_menu?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    # 生产环境使用加密密码，启动时通过环境变量JASYPT_ENCRYPTOR_PASSWORD传入解密密钥
    # 使用JasyptEncryptorTest生成加密值，然后替换为: ENC(加密后的密码)
    password: ENC(fTAwMDizF8ExjTGH)  # 请替换为实际加密后的值
    hikari:
      # 连接池名称
      pool-name: FoodMenuHikariPool
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接池大小
      maximum-pool-size: 20
      # 连接超时时间（毫秒），增加到30秒
      connection-timeout: 30000
      # 空闲连接存活最大时间（毫秒）
      idle-timeout: 600000
      # 连接最大存活时间（毫秒）
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1
      # 初始化时是否验证连接
      validate-on-connect: true
      # 自动提交
      auto-commit: true
      # 初始化超时时间（毫秒），-1表示不超时，等待连接池初始化完成
      initialization-fail-timeout: -1
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 30MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 关闭 Swagger（生产环境）
knife4j:
  enable: false
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# JWT配置（生产环境）
jwt:
  # 生产环境JWT密钥，使用加密配置
  # 使用JasyptEncryptorTest生成加密值
  secret: ENC(YourJWTSecretKeyEncrypted)  # 请替换为实际加密后的值
  expiration-time: 604800000

# Jasypt加密配置（生产环境）
# 必须通过环境变量或启动参数传入加密密钥
# export JASYPT_ENCRYPTOR_PASSWORD=FoodMenuSecretKey2024!@#
# 或: java -jar -Djasypt.encryptor.password=FoodMenuSecretKey2024!@# app.jar
jasypt:
  encryptor:
    algorithm: PBEWithMD5AndDES

# Aliyun OSS Configuration（生产环境）
aliyun:
  oss:
    endpoint: https://food-menu-yao.oss-cn-shenzhen.aliyuncs.com
    # 生产环境使用加密配置
    access-key-id: ENC(LTAI5tMRyKmbt7EZRgXjJRTk)  # 请替换为实际加密后的值
    access-key-secret: ENC(ueDZl8rmIIl4aVWzC7vM751eCZv0nf)  # 请替换为实际加密后的值
    bucket-name: food-menu-yao
    folder: food-menu/
    avatar-folder: avatars/
    presigned-url-expiration-hours: 24