server:
  port: 9090

spring:
  application:
    name: food_menu
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/food_menu?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    # 开发环境可以使用明文，生产环境建议加密: ENC(加密后的密码)
    password: ENC(ksT+7GYK/Fhr4/Z6YMlPAPVU8iYazDWr/zSDDDfzXvU=)
    hikari:
      # 连接池名称
      pool-name: FoodMenuHikariPool
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接池大小
      maximum-pool-size: 20
      # 连接超时时间（毫秒），增加到30秒，给数据库更多启动时间
      connection-timeout: 30000
      # 空闲连接存活最大时间（毫秒）
      idle-timeout: 600000
      # 连接最大存活时间（毫秒）
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1
      # 初始化时是否验证连接
      validate-on-connect: true
      # 自动提交
      auto-commit: true
      # 初始化超时时间（毫秒），等待连接池初始化完成
      initialization-fail-timeout: -1
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 30MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 关闭 Swagger(生产环境)
knife4j:
  enable: false
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false


# File Storage Configuration
# 文件存储配置(本地存储)
file:
  storage:
    type: local  # oss 或 local
    local:
      base-path: /www/wwwroot/food-menu-backend/uploads
      url-prefix: https://www.one2order.top/uploads
      folder: food-menu
      avatar-folder: avatars
  upload:
    path: /www/wwwroot/food-menu-backend/uploads
    image-path: /www/wwwroot/food-menu-backend/uploads/images
    avatar-path: /www/wwwroot/food-menu-backend/uploads/avatars
    url-prefix: /uploads

# JWT配置
jwt:
  # JWT密钥（生产环境建议64位以上，并使用加密）
  secret: ENC(yehd6sN4fxaSkDWix7RoOBcvByf6+vOFSHzwbg/GWZGIEx8+f5lAyLdiSqOb2KfIFdiaGk3/+cOk8tC/UgBZQ49YK6H5TZSGesaTZCdNVe8=)
  # Token过期时间（毫秒），默认7天
  expiration-time: 604800000

# Jasypt加密配置
# 加密密钥通过环境变量或启动参数传入
# 环境变量: JASYPT_ENCRYPTOR_PASSWORD
# 启动参数: -Djasypt.encryptor.password=your_password
jasypt:
  encryptor:
    # 加密算法
    algorithm: PBEWithMD5AndDES

