# 日志配置
logging:
  # 日志文件路径(使用项目目录,避免权限问题)
  file:
    path: /www/wwwroot/food-menu-backend/logs
  # 日志级别配置
  level:
    # 根日志级别
    root: INFO
    # 应用日志级别（开发环境使用DEBUG）
    com.yao.food_menu: DEBUG
    # MyBatis日志级别（显示SQL）
    com.yao.food_menu.mapper: DEBUG
    # 框架日志级别
    org.springframework: INFO
    org.springframework.web: DEBUG
    org.apache.ibatis: DEBUG
    com.baomidou: INFO
  # 日志输出格式
  pattern:
    # 文件输出格式
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"