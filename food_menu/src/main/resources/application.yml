server:
  port: 8080

spring:
  application:
    name: food_menu
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/food_menu?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    # 开发环境可以使用明文，生产环境建议加密: ENC(加密后的密码)
    password: root
    hikari:
      # 连接池名称
      pool-name: FoodMenuHikariPool
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接池大小
      maximum-pool-size: 20
      # 连接超时时间（毫秒），增加到30秒，给数据库更多启动时间
      connection-timeout: 30000
      # 空闲连接存活最大时间（毫秒）
      idle-timeout: 600000
      # 连接最大存活时间（毫秒）
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1
      # 初始化时是否验证连接
      validate-on-connect: true
      # 自动提交
      auto-commit: true
      # 初始化超时时间（毫秒），等待连接池初始化完成
      initialization-fail-timeout: -1
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 30MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j configuration
knife4j:
  enable: true
  setting:
    language: zh_cn

# SpringDoc OpenAPI configuration
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  packages-to-scan: com.yao.food_menu.controller

# File Storage Configuration
file:
  storage:
    type: local  # oss 或 local
    local:
      base-path: E:/uploads/food-menu
      url-prefix: http://localhost:8080/uploads
      folder: food-menu
      avatar-folder: avatars

# JWT配置
jwt:
  # JWT密钥（生产环境建议64位以上，并使用加密）
  secret: YourJWTSecretKeyForDevelopmentMustBeLongEnoughAndComplexMin64Chars!
  # Token过期时间（毫秒），默认7天
  expiration-time: 604800000

# Jasypt加密配置
# 加密密钥通过环境变量或启动参数传入
# 环境变量: JASYPT_ENCRYPTOR_PASSWORD
# 启动参数: -Djasypt.encryptor.password=your_password
jasypt:
  encryptor:
    # 加密算法
    algorithm: PBEWithMD5AndDES
    # 开发环境默认密钥（生产环境必须通过环境变量传入）
    password: DefaultPasswordChangeInProduction

# Aliyun OSS Configuration
aliyun:
  oss:
    endpoint: https://food-menu-yao.oss-cn-shenzhen.aliyuncs.com
    # 开发环境可以使用明文，生产环境建议加密: ENC(加密后的key)
    access-key-id: LTAI5tMRyKmbt7EZRgXjJRTk
    # access-key-secret: ENC(ueDZl8rmIIl4aVWzC7vM751eCZv0nf)
    bucket-name: food-menu-yao
    folder: food-menu/
    avatar-folder: avatars/
    presigned-url-expiration-hours: 24

# 日志配置（开发环境）
logging:
  # 日志文件路径
  file:
    path: logs
  # 日志级别配置
  level:
    # 根日志级别
    root: INFO
    # 应用日志级别（开发环境使用DEBUG）
    com.yao.food_menu: DEBUG
    # MyBatis日志级别（显示SQL）
    com.yao.food_menu.mapper: DEBUG
    # 框架日志级别
    org.springframework: INFO
    org.springframework.web: DEBUG
    org.apache.ibatis: DEBUG
    com.baomidou: INFO
  # 日志输出格式
  pattern:
    # 控制台输出格式
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
    # 文件输出格式
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# AI服务配置
ai:
  # 当前使用的AI服务提供商: silicon_flow, qwen, ollama, external
  provider: external
  
  # 外部AI服务配置 (aiCustomerService)
  external:
    base-url: http://localhost:9900
    # app-key: ak_LDG0En1pIm8TLZQy1D3LRY5l
    timeout: 30000

  # 硅基流动配置
  silicon-flow:
    api-key: ${AI_SILICON_FLOW_API_KEY:sk-cwdjbdkgrdmctlfbukcacxdgwyfcfoqitlwnfjhsdkcggpni}
    base-url: https://api.siliconflow.cn/v1
    model: Qwen/Qwen2.5-7B-Instruct
    max-tokens: 2000
    temperature: 0.7
    timeout: 30000
  
  # 通义千问配置(预留)
  qwen:
    api-key: ${AI_QWEN_API_KEY:}
    base-url: https://dashscope.aliyuncs.com/api/v1
    model: qwen-turbo
  
  # Ollama配置(预留)
  ollama:
    base-url: http://localhost:11434
    model: qwen2.5:7b